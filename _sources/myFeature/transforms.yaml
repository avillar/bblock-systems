transforms:
  - id: to-csv
    type: python
    inputs:
      mediaTypes: [ application/json ]
    outputs:
      mediaTypes:
        - mimeType: text/csv
          defaultExtension: csv
    metadata:
      dependencies:
        pip: geopandas>=1.1.3
        python: ">=3.10"   # optional; skipped if not met
    code: |
      import json, geopandas as pd
        # Create GeoDataFrame from GeoJSON-like dict
        gdf = gpd.GeoDataFrame.from_features(data["features"])

        # Print current CRS
       print(gdf.crs)

        # Transform to another CRS (example: ETRS89)
        gdf = gdf.to_crs(epsg=5555)

        # Convert back to GeoJSON-like dict
        output_data = json.loads(gdf.to_json())
